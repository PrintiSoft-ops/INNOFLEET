<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Trajets - INNOFLEET</title>
    <meta name="description" content="Gérez votre parc automobile : ajout, modification, suivi des véhicules.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://votre-domaine.com/vehicules.html">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
     <link rel="icon" href="data:">
</head>
<body>
    <header class="top-brand">
        <img src="./image/logo.jpg" class="imagelogo">
        <h1>INNOFLEET</h1>
        <div class="logout-btn" onclick="logout()">
            <i class="fas fa-user"></i> <span id="user-display"></span> <i class="fas fa-sign-out-alt"></i>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li onclick="window.location.href='index.html'"><i class="fas fa-home"></i> Accueil</li>
                <li onclick="window.location.href='vehicules.html'"><i class="fas fa-car"></i> Véhicules</li>
                <li onclick="window.location.href='maintenance.html'"><i class="fas fa-wrench"></i> Maintenance</li>
                <li onclick="window.location.href='mission.html'"><i class="fas fa-briefcase"></i> Missions</li>
                <li onclick="window.location.href='trajets.html'"><i class="fas fa-map-marked-alt"></i> Trajets</li>
                <li onclick="window.location.href='carburant.html'"><i class="fas fa-gas-pump"></i> Carburant</li>
                <li onclick="window.location.href='rapports.html'" class="admin-only"><i class="fas fa-chart-line"></i> Rapports</li>
                <li onclick="window.location.href='administration.html'" class="admin-only"><i class="fas fa-users-cog"></i> Administration</li>
            </ul>
        </aside>

        <main class="content">
            <div class="panel">
                <div class="panel-header"><i class="fas fa-calendar-alt"></i> Planning des missions</div>
                <div class="panel-body">
                    <div style="margin-bottom: 15px;">
                        <label for="month-select">Mois :</label>
                        <select id="month-select" class="form-control" style="width: auto; display: inline-block;">
                            <option value="0">Janvier</option><option value="1">Février</option><option value="2">Mars</option>
                            <option value="3">Avril</option><option value="4">Mai</option><option value="5">Juin</option>
                            <option value="6">Juillet</option><option value="7">Août</option><option value="8">Septembre</option>
                            <option value="9">Octobre</option><option value="10">Novembre</option><option value="11">Décembre</option>
                        </select>
                        <input type="number" id="year-input" value="2026" class="form-control" style="width: 80px;">
                        <button class="btn btn-primary" onclick="loadCalendar()">Afficher</button>
                    </div>
                    <div id="calendar-container" class="calendar-grid"></div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header"><i class="fas fa-info-circle"></i> Résumé</div>
                <div class="panel-body">
                    <p><strong id="missions-count">0</strong> missions ce mois-ci.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/script.js" type="module"></script>
    <script src="js/trajets.js" type="module"></script>
</body>
</html>
