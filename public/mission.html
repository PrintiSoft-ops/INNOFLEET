<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Missions - INNOFLEET</title>
        <meta name="description" content="Gérez votre parc automobile : ajout, modification, suivi des véhicules.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://votre-domaine.com/vehicules.html">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="./css/style.css">
     <link rel="icon" href="data:">
</head>
<body>
    <header class="top-brand">
        <img src="./image/logo.jpg" class="imagelogo">
        <h1>INNOFLEET</h1>
        <div class="logout-btn" onclick="logout()">
            <i class="fas fa-user"></i> <span id="user-display"></span> <i class="fas fa-sign-out-alt"></i>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li onclick="window.location.href='index.html'"><i class="fas fa-home"></i> Accueil</li>
                <li onclick="window.location.href='vehicules.html'"><i class="fas fa-car"></i> Véhicules</li>
                <li onclick="window.location.href='maintenance.html'"><i class="fas fa-wrench"></i> Maintenance</li>
                <li onclick="window.location.href='mission.html'"><i class="fas fa-briefcase"></i> Missions</li>
                <li onclick="window.location.href='trajets.html'"><i class="fas fa-map-marked-alt"></i> Trajets</li>
                <li onclick="window.location.href='carburant.html'"><i class="fas fa-gas-pump"></i> Carburant</li>
                <li onclick="window.location.href='rapports.html'" class="admin-only"><i class="fas fa-chart-line"></i> Rapports</li>
                <li onclick="window.location.href='administration.html'" class="admin-only"><i class="fas fa-users-cog"></i> Administration</li>
            </ul>
        </aside>

        <main class="content">
            <div class="panel">
                <div class="panel-header"><i class="fas fa-edit"></i> Nouvelle mission</div>
                <div class="panel-body" id="mission-form">
                    <div style="display: grid; grid-template-columns: repeat(3,1fr); gap: 15px;">
                        <div class="form-group">
                            <label>Conducteur :</label>
                            <input type="text" class="form-control" id="mission-conducteur" placeholder="Nom">
                        </div>
                        <div class="form-group">
                            <label>Véhicule :</label>
                            <select class="form-control" id="mission-vehicule"></select>
                        </div>
                        <div class="form-group">
                            <label>Destination :</label>
                            <input type="text" class="form-control" id="mission-destination" placeholder="Ville">
                        </div>
                        <div class="form-group">
                            <label>Début :</label>
                            <input type="date" class="form-control" id="mission-debut">
                        </div>
                        <div class="form-group">
                            <label>Fin :</label>
                            <input type="date" class="form-control" id="mission-fin">
                        </div>
                        <div class="form-group">
                            <label>Km départ :</label>
                            <input type="number" class="form-control" id="mission-km">
                        </div>
                        <button class="btn btn-primary" onclick="saveMission()" style="grid-column: span 3; justify-self: start;">Enregistrer</button>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header"><i class="fas fa-table"></i> Historique des missions</div>
                <div class="panel-body">
                    <div class="toolbar">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchMission" placeholder="Rechercher...">
                        </div>
                    </div>
                    <table class="data-table" id="missions-table">
                        <thead>
                            <tr>
                                <th>Conducteur</th>
                                <th>Véhicule</th>
                                <th>Début</th>
                                <th>Fin</th>
                                <th>Statut</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal pour modifier -->
    <div id="modal-mission" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Modifier la mission</h3>
            <div class="form-group">
                <label>Conducteur</label>
                <input type="text" id="edit-mission-conducteur" class="form-control">
            </div>
            <div class="form-group">
                <label>Véhicule</label>
                <select id="edit-mission-vehicule" class="form-control"></select>
            </div>
            <div class="form-group">
                <label>Destination</label>
                <input type="text" id="edit-mission-destination" class="form-control">
            </div>
            <div class="form-group">
                <label>Début</label>
                <input type="date" id="edit-mission-debut" class="form-control">
            </div>
            <div class="form-group">
                <label>Fin</label>
                <input type="date" id="edit-mission-fin" class="form-control">
            </div>
            <div class="form-group">
                <label>Km départ</label>
                <input type="number" id="edit-mission-km" class="form-control">
            </div>
            <div class="form-group">
                <label>Statut</label>
                <select id="edit-mission-statut" class="form-control">
                    <option value="En cours">En cours</option>
                    <option value="Terminée">Terminée</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="updateMission()">Mettre à jour</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="js/script.js" type="module"></script>
    <script src="js/missions.js" type="module"></script>
</body>
</html>
