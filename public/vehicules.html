<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Véhicules - INNOFLEET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="data:">
    <meta name="description" content="Gérez votre parc automobile : ajout, modification, suivi des véhicules.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://votre-domaine.com/vehicules.html">
</head>
<body>
    <header class="top-brand">
        <img src="./image/logo.jpg" class="imagelogo">
        <h1>INNOFLEET</h1>
        <div class="logout-btn" onclick="logout()">
            <i class="fas fa-user"></i> <span id="user-display"></span> <i class="fas fa-sign-out-alt"></i>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li onclick="window.location.href='index.html'"><i class="fas fa-home"></i> Accueil</li>
                <li onclick="window.location.href='vehicules.html'"><i class="fas fa-car"></i> Véhicules</li>
                <li onclick="window.location.href='maintenance.html'"><i class="fas fa-wrench"></i> Maintenance</li>
                <li onclick="window.location.href='mission.html'"><i class="fas fa-briefcase"></i> Missions</li>
                <li onclick="window.location.href='trajets.html'"><i class="fas fa-map-marked-alt"></i> Trajets</li>
                <li onclick="window.location.href='carburant.html'"><i class="fas fa-gas-pump"></i> Carburant</li>
                <li onclick="window.location.href='rapports.html'" class="admin-only"><i class="fas fa-chart-line"></i> Rapports</li>
                <li onclick="window.location.href='administration.html'" class="admin-only"><i class="fas fa-users-cog"></i> Administration</li>
            </ul>
        </aside>

        <main class="content">
            <div class="panel">
                <div class="panel-header"><i class="fas fa-list"></i> Véhicules</div>
                <div class="panel-body">
                    <div class="toolbar">
                        <div class="toolbar-left">
                            <button class="btn btn-primary" onclick="addVehicule()"><i class="fas fa-plus-circle"></i> Nouveau</button>
                        </div>
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchMission" placeholder="Rechercher...">
                        </div>
                    </div>
                    <table class="data-table" id="vehicules-table">
                        <thead>
                            <tr>
                                <th>Immatriculation</th>
                                <th>Marque</th>
                                <th>Modèle</th>
                                <th>Statut</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal pour ajouter/modifier véhicule -->
    <div id="modal-vehicule" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modal-title">Ajouter un véhicule</h3>
            <div class="form-group">
                <label>Immatriculation</label>
                <input type="text" id="veh-immat" class="form-control">
            </div>
            <div class="form-group">
                <label>Marque</label>
                <input type="text" id="veh-marque" class="form-control">
            </div>
            <div class="form-group">
                <label>Modèle</label>
                <input type="text" id="veh-modele" class="form-control">
            </div>
            <div class="form-group">
                <label>Statut</label>
                <select id="veh-statut" class="form-control">
                    <option value="disponible">Disponible</option>
                    <option value="en mission">En mission</option>
                    <option value="maintenance">Maintenance</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="saveVehicule()">Enregistrer</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="js/script.js" type="module"></script>
    <script src="js/vehicules.js" type="module"></script>
</body>
</html>
